
# Skin Lesion Diagnosis - Master Configuration File
# ALL hyperparameters are declared here explicitly.
# Reproducibility: random seed, explicit hyperparameter

project:
  name: "skin_lesion_diagnosis"
  random_seed: 42            # fixed for full reproducibility
  device: "cuda"             # falls back to "cpu" automatically if unavailable

#  File paths (relative to project root)
paths:
  data_raw:     "data/raw"
  data_splits:  "data/splits"
  checkpoints:  "checkpoints"
  results:      "results"

#  Dataset & class metadata 
data:
  image_size:   224           
  num_classes:  7

  # Short codes used in the metadata CSV
  class_labels: ["nv", "mel", "bkl", "bcc", "akiec", "vasc", "df"]

  # Full clinical names for display
  class_names:
    - "Melanocytic nevi"
    - "Melanoma"
    - "Benign keratosis"
    - "Basal cell carcinoma"
    - "Actinic keratosis"
    - "Vascular lesions"
    - "Dermatofibroma"

  # Risk levels for the Streamlit dashboard
  risk_levels: ["Low", "High", "Low", "Medium", "Medium", "Low", "Low"]

  # ImageNet statistics: required because all backbones are ImageNet-pretrained
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]

  # Stratified split ratios
  train_ratio: 0.70
  val_ratio:   0.15
  test_ratio:  0.15

# DataLoader settings 
dataloader:
  batch_size:  32
  num_workers: 4
  pin_memory:  false

#  Augmentation (albumentations, training only)
# data augmentation with albumentations
augmentation:
  horizontal_flip_p:   0.5   
  vertical_flip_p:     0.5   
  rotation_limit_deg:  30    # lesion angle is diagnostically irrelevant
  rotation_p:          0.5
  color_jitter_p:      0.5   # simulates different dermoscope devices
  brightness_limit:    0.2
  contrast_limit:      0.2
  saturation_limit:    0.2
  hue_limit:           0.05
  elastic_alpha:       120   # simulates soft tissue deformation
  elastic_sigma:       6
  elastic_p:           0.3
  cutout_holes:        4     # forces model to use global context (Cutout)
  cutout_hole_height:  20
  cutout_hole_width:   20
  cutout_p:            0.3

# ViT-B/16 + LoRA (comparison model)
vit:
  backbone:     "vit_base_patch16_224"  # timm model name
  pretrained:   true
  dropout:      0.1
  epochs:       20
  lr:           1.0e-4
  weight_decay: 1.0e-4
  early_stopping_patience: 10
  min_lr:       1.0e-7
  use_amp:      true
  # LoRA hyperparameters (Low-Rank Adaptation)
  lora_rank:    4     # rank of decomposition matrices A and B
  lora_alpha:   16    # scaling factor alpha/rank
  lora_dropout: 0.1

# ResNet50 (strong baseline)
resnet50:
  backbone:     "resnet50"
  pretrained:   true
  dropout:      0.3
  epochs:       20
  lr:           1.0e-4
  weight_decay: 1.0e-4
  early_stopping_patience: 10
  min_lr:       1.0e-7
  use_amp:      true

# Simple CNN (from-scratch baseline) 
simple_cnn:
  epochs:       40
  lr:           1.0e-3
  weight_decay: 1.0e-4
  early_stopping_patience: 10
  min_lr:       1.0e-7

# Embedding analysis 
embeddings:
  pca_n_components:  50    # intermediate PCA before t-SNE (speedup)
  tsne_perplexity:   30
  tsne_n_iter:       1000
  tsne_random_state: 42
